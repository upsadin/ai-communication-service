server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ai-communication-service

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 50
      thread-name-prefix: "async-"

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/aicomm}
    username: ${DB_USERNAME:aicomm}
    password: ${DB_PASSWORD:aicomm_local}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:aicomm-consumer-group}
      auto-offset-reset: earliest
      enable-auto-commit: false
      isolation-level: read_committed
      max-poll-records: 1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.aicomm.kafka.dto
        spring.json.value.default.type: com.aicomm.kafka.dto.MessageProcessingTask
        spring.json.use.type.headers: false
    listener:
      ack-mode: manual

app:
  kafka:
    topic:
      message-tasks: ${KAFKA_TOPIC_MESSAGE_TASKS:ai.processing.filtered}
  agent:
    memory-max-messages: ${AGENT_MEMORY_MAX_MESSAGES:20}
  schedule:
    work-start: ${WORK_START:09:00}
    work-end: ${WORK_END:18:35}
    timezone: ${WORK_TIMEZONE:Europe/Moscow}
    work-days: ${WORK_DAYS:MONDAY,TUESDAY,WEDNESDAY,THURSDAY,FRIDAY}
    morning-delay-min-ms: ${MORNING_DELAY_MIN_MS:60000}
    morning-delay-max-ms: ${MORNING_DELAY_MAX_MS:1800000}
    poll-interval-ms: ${DEFERRED_POLL_INTERVAL_MS:60000}
  rate-limit:
    first-contact-interval-sec: ${RATE_LIMIT_FIRST_CONTACT_SEC:120}
    max-first-contacts-per-day: ${RATE_LIMIT_MAX_FIRST_CONTACTS_DAY:25}
  test-task:
    timeout-days: ${TEST_TASK_TIMEOUT_DAYS:3}
  telegram:
    read-delay:
      min-ms: ${READ_DELAY_MIN_MS:3000}       # 3-15s pause before "typing" appears (reading/thinking)
      max-ms: ${READ_DELAY_MAX_MS:15000}
    typing:
      ms-per-char: ${TYPING_MS_PER_CHAR:120}   # ~120ms per char ≈ real human typing speed
      min-typing-ms: ${TYPING_MIN_MS:3000}     # minimum typing duration
      max-typing-ms: ${TYPING_MAX_MS:55000}    # maximum typing duration

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:}
      model-name: ${OPENAI_MODEL:gpt-4o}
      temperature: ${OPENAI_TEMPERATURE:0.7}
      max-tokens: ${OPENAI_MAX_TOKENS:500}

# All secrets via env vars or application-local.yml
telegram:
  api-id: ${TELEGRAM_API_ID:0}
  api-hash: ${TELEGRAM_API_HASH:}
  phone: ${TELEGRAM_PHONE:}
  session-path: ${TELEGRAM_SESSION_PATH:tdlib-session}

logging:
  level:
    com.aicomm: DEBUG
    it.tdlight: INFO
